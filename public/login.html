<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Task Manager</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .login-container {
            max-width: 440px;
            width: 100%;
            padding: 2.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            box-shadow: var(--shadow);
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        .login-header p {
            color: var(--text-secondary);
            font-size: 0.9375rem;
        }
        .input-group {
            margin-bottom: 1.25rem;
        }
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.875rem;
        }
        .input-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            font-size: 0.9375rem;
            font-family: inherit;
            color: var(--text-primary);
            background: var(--card-bg);
            transition: all 0.2s;
            box-sizing: border-box;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(240, 106, 106, 0.1);
        }
        .btn-primary {
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.75rem;
        }
        .btn-primary:hover:not(:disabled) {
            background: var(--primary-hover);
            box-shadow: var(--shadow-sm);
        }
        .btn-primary:disabled {
            background: var(--text-secondary);
            cursor: not-allowed;
            opacity: 0.6;
        }
        .error-message {
            padding: 1rem;
            background: #fee2e2;
            border: 1px solid #fca5a5;
            border-radius: 0.5rem;
            color: #991b1b;
            margin-bottom: 1.25rem;
            display: none;
            font-size: 0.875rem;
        }
        .success-message {
            padding: 1rem;
            background: #dcfce7;
            border: 1px solid #86efac;
            border-radius: 0.5rem;
            color: #166534;
            margin-bottom: 1.25rem;
            display: none;
            font-size: 0.875rem;
        }
        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        .forgot-link {
            text-align: center;
            margin-top: 1rem;
        }
        .forgot-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
        }
        .forgot-link a:hover {
            color: var(--primary-color);
            text-decoration: underline;
        }
        @media (max-width: 640px) {
            .login-container { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Welcome Back</h1>
            <p>Sign in to your account</p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <!-- Sign In Form -->
        <form id="loginForm">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primary" id="submitBtn">Sign In</button>
        </form>

        <div class="forgot-link" id="forgotLinkContainer">
            <a href="#" id="forgotPasswordLink">Forgot your password?</a>
        </div>

        <!-- Forgot Password Form -->
        <form id="forgotPasswordForm" style="display:none;">
            <div class="input-group">
                <label for="resetEmail">Email Address</label>
                <input type="email" id="resetEmail" name="resetEmail" placeholder="you@example.com" required autocomplete="email">
            </div>
            <button type="submit" class="btn-primary" id="resetBtn">Send Reset Link</button>
            <div class="forgot-link" style="margin-top:1rem;">
                <a href="#" id="backToLoginLink">Back to Sign In</a>
            </div>
        </form>

        <!-- Sign Up Form -->
        <form id="signupForm" style="display:none;">
            <div class="input-group">
                <label for="signupName">Name</label>
                <input type="text" id="signupName" name="signupName" placeholder="Your name" required autocomplete="name">
            </div>
            <div class="input-group">
                <label for="signupEmail">Email Address</label>
                <input type="email" id="signupEmail" name="signupEmail" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="input-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" name="signupPassword" placeholder="At least 6 characters" required autocomplete="new-password" minlength="6">
            </div>
            <button type="submit" class="btn-primary" id="signupBtn">Create Account</button>
            <div class="forgot-link" style="margin-top:1rem;">
                <a href="#" id="backToLoginFromSignup">Already have an account? Sign in</a>
            </div>
        </form>

        <div class="footer-text" id="footerText">
            Don't have an account? <a href="#" id="showSignupLink" style="color:var(--primary-color);text-decoration:none;">Sign up</a>
        </div>
    </div>

    <script src="/vendor/supabase.js"></script>
    <script src="/auth-helper.js"></script>
    <script>
        var loginForm = document.getElementById('loginForm');
        var forgotPasswordForm = document.getElementById('forgotPasswordForm');
        var emailInput = document.getElementById('email');
        var passwordInput = document.getElementById('password');
        var submitBtn = document.getElementById('submitBtn');
        var errorEl = document.getElementById('errorMessage');
        var successEl = document.getElementById('successMessage');
        var forgotPasswordLink = document.getElementById('forgotPasswordLink');
        var backToLoginLink = document.getElementById('backToLoginLink');
        var forgotLinkContainer = document.getElementById('forgotLinkContainer');
        var resetEmailInput = document.getElementById('resetEmail');
        var resetBtn = document.getElementById('resetBtn');

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            successEl.style.display = 'none';
        }
        function showSuccess(msg) {
            successEl.textContent = msg;
            successEl.style.display = 'block';
            errorEl.style.display = 'none';
        }
        function hideMessages() {
            errorEl.style.display = 'none';
            successEl.style.display = 'none';
        }
        function setLoading(btn, loading, loadingText, defaultText) {
            if (loading) {
                btn.disabled = true;
                var spinner = document.createElement('span');
                spinner.className = 'loading-spinner';
                btn.textContent = loadingText;
                btn.insertBefore(spinner, btn.firstChild);
            } else {
                btn.disabled = false;
                btn.textContent = defaultText;
            }
        }

        // Check if already logged in — redirect to app if so
        (async function() {
            try {
                var client = window.getSupabaseClient ? window.getSupabaseClient() : null;
                if (client) {
                    var sessionData = await client.auth.getSession();
                    if (sessionData.data && sessionData.data.session) {
                        window.location.href = '/';
                    }
                }
            } catch (_) { /* not logged in */ }
        })();

        // Sign In — direct Supabase auth, no server call needed
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            hideMessages();

            var email = emailInput.value.trim();
            var password = passwordInput.value;

            if (!email || !password) {
                showError('Please enter both email and password.');
                return;
            }

            setLoading(submitBtn, true, 'Signing in...', 'Sign In');

            try {
                var client = window.getSupabaseClient();
                if (!client) throw new Error('Authentication service unavailable. Please refresh the page.');

                var result = await client.auth.signInWithPassword({ email: email, password: password });
                var data = result.data;
                var error = result.error;

                if (error) {
                    if (error.message.indexOf('Invalid login credentials') !== -1) {
                        throw new Error('Incorrect email or password. Please try again.');
                    }
                    if (error.message.indexOf('Email not confirmed') !== -1) {
                        throw new Error('Please confirm your email address before signing in.');
                    }
                    throw new Error(error.message);
                }

                if (!data.session) {
                    throw new Error('Sign in failed. Please try again.');
                }

                showSuccess('Signed in! Redirecting...');
                submitBtn.textContent = 'Success!';
                setTimeout(function() { window.location.href = '/'; }, 500);

            } catch (err) {
                console.error('Login error:', err);
                showError(err.message || 'Failed to sign in. Please check your credentials.');
                setLoading(submitBtn, false, '', 'Sign In');
            }
        });

        // Forgot password toggle
        forgotPasswordLink.addEventListener('click', function(e) {
            e.preventDefault();
            hideMessages();
            loginForm.style.display = 'none';
            forgotLinkContainer.style.display = 'none';
            forgotPasswordForm.style.display = 'block';
            resetEmailInput.value = emailInput.value;
            resetEmailInput.focus();
        });

        backToLoginLink.addEventListener('click', function(e) {
            e.preventDefault();
            hideMessages();
            forgotPasswordForm.style.display = 'none';
            loginForm.style.display = 'block';
            forgotLinkContainer.style.display = 'block';
            emailInput.focus();
        });

        // Password reset via Supabase
        forgotPasswordForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            hideMessages();

            var email = resetEmailInput.value.trim();
            if (!email) {
                showError('Please enter your email address.');
                return;
            }

            setLoading(resetBtn, true, 'Sending...', 'Send Reset Link');

            try {
                var client = window.getSupabaseClient();
                if (!client) throw new Error('Authentication service unavailable. Please refresh the page.');

                var result = await client.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/reset-password.html'
                });

                if (result.error) throw new Error(result.error.message);

                showSuccess('Password reset link sent! Check your email inbox.');
                resetBtn.textContent = 'Link Sent';

                setTimeout(function() {
                    forgotPasswordForm.style.display = 'none';
                    loginForm.style.display = 'block';
                    forgotLinkContainer.style.display = 'block';
                    setLoading(resetBtn, false, '', 'Send Reset Link');
                }, 3000);

            } catch (err) {
                console.error('Password reset error:', err);
                showError(err.message || 'Failed to send reset link. Please try again.');
                setLoading(resetBtn, false, '', 'Send Reset Link');
            }
        });

        // Auto-focus email
        emailInput.focus();

        // Sign Up toggle
        var signupForm = document.getElementById('signupForm');
        var showSignupLink = document.getElementById('showSignupLink');
        var backToLoginFromSignup = document.getElementById('backToLoginFromSignup');
        var signupBtn = document.getElementById('signupBtn');
        var footerText = document.getElementById('footerText');

        function showSignup() {
            hideMessages();
            loginForm.style.display = 'none';
            forgotLinkContainer.style.display = 'none';
            footerText.style.display = 'none';
            signupForm.style.display = 'block';
            document.getElementById('signupName').focus();
            document.querySelector('.login-header h1').textContent = 'Create Account';
            document.querySelector('.login-header p').textContent = 'Get started with your team';
        }

        function showLogin() {
            hideMessages();
            signupForm.style.display = 'none';
            forgotPasswordForm.style.display = 'none';
            loginForm.style.display = 'block';
            forgotLinkContainer.style.display = 'block';
            footerText.style.display = 'block';
            document.querySelector('.login-header h1').textContent = 'Welcome Back';
            document.querySelector('.login-header p').textContent = 'Sign in to your account';
            emailInput.focus();
        }

        showSignupLink.addEventListener('click', function(e) { e.preventDefault(); showSignup(); });
        backToLoginFromSignup.addEventListener('click', function(e) { e.preventDefault(); showLogin(); });

        signupForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            hideMessages();

            var name = document.getElementById('signupName').value.trim();
            var email = document.getElementById('signupEmail').value.trim();
            var password = document.getElementById('signupPassword').value;

            if (!name || !email || !password) {
                showError('Please fill in all fields.');
                return;
            }

            setLoading(signupBtn, true, 'Creating account...', 'Create Account');

            try {
                var client = window.getSupabaseClient();
                if (!client) throw new Error('Authentication service unavailable. Please refresh the page.');

                var result = await client.auth.signUp({
                    email: email,
                    password: password,
                    options: { data: { name: name } }
                });

                if (result.error) throw new Error(result.error.message);

                // If session returned immediately, email confirmation is disabled — go straight to app
                if (result.data.session) {
                    showSuccess('Account created! Redirecting...');
                    setTimeout(function() { window.location.href = '/'; }, 800);
                } else {
                    showSuccess('Account created! Check your email to confirm your address, then sign in.');
                    signupBtn.textContent = 'Check your email';
                    setTimeout(function() { showLogin(); setLoading(signupBtn, false, '', 'Create Account'); }, 4000);
                }

            } catch (err) {
                console.error('Signup error:', err);
                showError(err.message || 'Failed to create account. Please try again.');
                setLoading(signupBtn, false, '', 'Create Account');
            }
        });
    </script>
</body>
</html>
